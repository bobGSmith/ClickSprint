<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>100m Tap Sprint</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="100 meter tap sprint game">
      <section class="track-stage" aria-live="polite">
        <div class="hud">
          <div>
            <span class="label">Distance</span>
            <strong id="distanceReadout">100.0m</strong>
          </div>
          <div>
            <span class="label">Time</span>
            <strong id="timeReadout">0.00s</strong>
          </div>
          <div>
            <span class="label">Pace</span>
            <strong id="paceReadout">0.0/s</strong>
          </div>
          <div>
            <span class="label">PB</span>
            <strong id="pbReadout">--</strong>
          </div>
          <button class="leaderboard-button" id="openLeaderboardButton" type="button">
            <span aria-hidden="true">🏆</span>
            <strong>Board</strong>
          </button>
        </div>

        <div class="track">
          <div class="start-line"><span>Start</span></div>
          <div class="runner" id="runner" aria-hidden="true">
            <span class="runner-head"></span>
            <span class="runner-body"></span>
            <span class="runner-arm runner-arm-left"></span>
            <span class="runner-arm runner-arm-right"></span>
            <span class="runner-leg runner-leg-left"></span>
            <span class="runner-leg runner-leg-right"></span>
          </div>
          <div class="finish-line" id="finishLine">
            <span>Finish</span>
          </div>
        </div>

        <div class="signal" id="signalText">100m Tap Sprint</div>
        <button class="start-button" id="startButton" type="button">Start</button>
      </section>

      <section class="modal results-modal" id="resultsPanel" hidden aria-label="Race analysis">
        <div class="modal-card">
          <div class="modal-header">
            <div class="finish-title">
              <h2>FINISH!</h2>
              <p id="finishSubtitle">Race complete</p>
            </div>
            <button class="icon-button" id="closeResultsButton" type="button" aria-label="Close results">x</button>
          </div>

          <div class="result-grid">
            <div>
              <span class="label">Total time</span>
              <strong id="resultTime">0.00s</strong>
            </div>
            <div>
              <span class="label">Reaction</span>
              <strong id="reactionTime">--</strong>
            </div>
            <div>
              <span class="label">Top speed (10m)</span>
              <strong id="topSpeedReadout">0.0/s</strong>
            </div>
            <div>
              <span class="label">PB</span>
              <strong id="resultPbReadout">--</strong>
            </div>
          </div>

          <canvas id="cpsChart" width="640" height="260" aria-label="Clicks per second over time"></canvas>

          <form class="submit-run" id="submitRunForm">
            <label for="playerName">Name</label>
            <div class="submit-row">
              <input id="playerName" name="playerName" type="text" maxlength="18" autocomplete="nickname" placeholder="Your name" />
              <button type="submit">Submit</button>
            </div>
            <p id="submitStatus" role="status"></p>
          </form>

          <div class="leaderboard">
            <div class="leaderboard-title">Local Top 10</div>
            <ol id="leaderboardList"></ol>
          </div>
        </div>
      </section>

      <section class="modal leaderboard-modal" id="leaderboardModal" hidden aria-label="Leaderboard">
        <div class="modal-card">
          <div class="modal-header">
            <h2>Leaderboard</h2>
            <button class="icon-button" id="closeLeaderboardButton" type="button" aria-label="Close leaderboard">x</button>
          </div>

          <div class="tabs" role="tablist" aria-label="Leaderboard views">
            <button class="tab-button active" id="scoresTab" type="button">Scores</button>
            <button class="tab-button" id="statsTab" type="button">Stats</button>
          </div>

          <div class="tab-panel" id="scoresPanel">
            <div class="leaderboard-table" id="remoteLeaderboard"></div>
          </div>

          <div class="tab-panel" id="statsPanel" hidden>
            <div class="histogram-grid">
              <canvas class="histogram" id="timeHistogram" width="640" height="190" aria-label="Best times histogram"></canvas>
              <canvas class="histogram" id="speedHistogram" width="640" height="190" aria-label="Top speeds histogram"></canvas>
              <canvas class="histogram" id="reactionHistogram" width="640" height="190" aria-label="Reaction times histogram"></canvas>
            </div>
          </div>
        </div>
      </section>

      <section class="shoe-controls" aria-label="Running controls">
        <button class="shoe-button left-shoe" id="leftShoe" type="button" aria-label="Left shoe">
          <span class="shoe" aria-hidden="true">👟</span>
        </button>
        <button class="shoe-button right-shoe" id="rightShoe" type="button" aria-label="Right shoe">
          <span class="shoe" aria-hidden="true">👟</span>
        </button>
      </section>
    </main>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
